<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1100">
    <title>Breakout Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="icon" sizes="180x180" href='alien.ico'>

    <link rel="stylesheet" href="juego.css">
</head>
<body>
    <h2 class="game-title">INVASION ALIENIGENA</h2>
    
    <div id="game-container">
        <div id="ui-layer">
            <div id="puntos">PUNTITOS: 0</div>
            <p></p>
            <p></p> 
            <div id="vivas-display">VIDAS: ❤️❤️❤️</div>
            <div id="energy-container">
                <span>ENERGIA:</span>
                <div id="energy-bar"><div id="energy-fill"></div></div>
            </div>       
            <p></p> 
        </div>
        
        <canvas id="canvas"></canvas>

        <div class="modos">
            <button id="single-level">INICIAR MISION</button>
        </div>

        <div id="game-over" class="modal">
            <div class="modal-content">
                <h2 id="modal-title">GAME OVER</h2>
                <button id="restart-button">REINTENTAR</button>
            </div>
        </div>
    </div>        

    <div id="controls">
        <p>CONTROLES: ⬅️➡️ ▬ SPACE para disparar</p>
        <div class="game-controls">
            <button id="btn-left">◀️</button>
            <button id="btn-shoot">💥</button>
            <button id="btn-right">▶️</button>
        </div>
    </div>
    <script src="crono.js"></script>
</body>
</html>
